{% extends 'base.html' %}
{% block title %}Вход в аккаунт{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card shadow-lg border-0 rounded-4" style="width: 100%; max-width: 450px;">
        <div class="card-header bg-primary text-white text-center rounded-top-4 py-3">
            <h3 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> Вход</h3>
        </div>
        <div class="card-body p-4">
            <form method="post">
                {% csrf_token %}
                {% if form.errors %}
                    <div class="alert alert-danger" role="alert">
                        Неверное имя пользователя или пароль. Попробуйте снова.
                    </div>
                {% endif %}
                <div class="mb-3">
                    <label for="id_username" class="form-label">Имя пользователя или email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" id="id_username" class="form-control" placeholder="Введите логин" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="id_password" class="form-label">Пароль</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" id="id_password" class="form-control" placeholder="••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 mt-2">Войти</button>
            </form>
            <hr class="my-4">
            <p class="text-center mb-0">Нет аккаунта? <a href="{% url 'register' %}">Зарегистрируйтесь</a></p>
        </div>
    </div>
</div>
{% endblock %}
